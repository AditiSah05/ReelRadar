services:
  - type: web
    name: reelradar
    env: node
    rootDir: .
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend --include=dev && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: TMDB_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
